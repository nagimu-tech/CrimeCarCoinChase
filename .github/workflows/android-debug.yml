name: Android Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  assemble-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"

      - name: Restore debug signing key
        env:
          ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_DEBUG_KEYSTORE_BASE64" ]; then
            echo "ANDROID_DEBUG_KEYSTORE_BASE64 secret is required to sign a compatible debug APK."
            exit 1
          fi
          printf '%s' "$ANDROID_DEBUG_KEYSTORE_BASE64" | tr -d '\r\n\t ' | base64 --decode > app/debug.keystore

      - name: Assemble debug APK
        run: gradle assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pogonya-debug-apk
          path: app/build/outputs/apk/debug/*.apk
