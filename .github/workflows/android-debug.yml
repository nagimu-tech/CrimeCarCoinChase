name: Android Debug APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  assemble-debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.4"

      - name: Restore debug signing key
        env:
          ANDROID_DEBUG_KEYSTORE_BASE64: ${{ secrets.ANDROID_DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_DEBUG_KEYSTORE_BASE64" ]; then
            echo "ANDROID_DEBUG_KEYSTORE_BASE64 secret is required to sign a compatible debug APK."
            exit 1
          fi
          printf '%s' "$ANDROID_DEBUG_KEYSTORE_BASE64" | tr -d '\r\n\t ' | base64 --decode --ignore-garbage > app/debug.keystore
          keytool -list -keystore app/debug.keystore -storepass android -alias androiddebugkey >/dev/null

      - name: Assemble debug APK
        run: gradle assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pogonya-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish latest APK to Beget
        env:
          BEGET_HOST: ${{ secrets.BEGET_HOST }}
          BEGET_USER: ${{ secrets.BEGET_USER }}
          BEGET_SSH_KEY: ${{ secrets.BEGET_SSH_KEY }}
          BEGET_PORT: ${{ secrets.BEGET_PORT }}
        run: |
          if [ -z "$BEGET_HOST" ] || [ -z "$BEGET_USER" ] || [ -z "$BEGET_SSH_KEY" ]; then
            echo "Beget SSH secrets are not configured."
            exit 1
          fi
          APK="$(find app/build/outputs/apk/debug -name '*.apk' | head -n 1)"
          if [ -z "$APK" ]; then
            echo "No debug APK found."
            exit 1
          fi
          VERSION_CODE="$(grep -o 'versionCode = [0-9]*' app/build.gradle.kts | grep -o '[0-9]*')"
          VERSION_NAME="$(grep -o 'versionName = "[^"]*"' app/build.gradle.kts | sed 's/versionName = "//; s/"//')"
          PORT="${BEGET_PORT:-22}"
          APK_URL="http://${BEGET_HOST}:8080/downloads/pogonya-latest.apk"
          cat > android-version.json <<JSON
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${VERSION_NAME}",
            "apkUrl": "${APK_URL}"
          }
          JSON
          mkdir -p ~/.ssh
          printf '%s\n' "$BEGET_SSH_KEY" > ~/.ssh/beget_deploy_key
          chmod 600 ~/.ssh/beget_deploy_key
          ssh-keyscan -p "$PORT" -H "$BEGET_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/beget_deploy_key -p "$PORT" "$BEGET_USER@$BEGET_HOST" "mkdir -p /opt/coin-chase-server/public"
          scp -i ~/.ssh/beget_deploy_key -P "$PORT" "$APK" "$BEGET_USER@$BEGET_HOST:/opt/coin-chase-server/public/pogonya-latest.apk"
          scp -i ~/.ssh/beget_deploy_key -P "$PORT" android-version.json "$BEGET_USER@$BEGET_HOST:/opt/coin-chase-server/public/android-version.json"
          ssh -i ~/.ssh/beget_deploy_key -p "$PORT" "$BEGET_USER@$BEGET_HOST" "chmod 644 /opt/coin-chase-server/public/pogonya-latest.apk /opt/coin-chase-server/public/android-version.json"

      - name: Send debug APK by email
        continue-on-error: true
        env:
          SMTP_HOST: smtp.yandex.ru
          SMTP_PORT: "465"
          SMTP_USER: osameli@yandex.ru
          SMTP_PASSWORD: ${{ secrets.YANDEX_SMTP_PASSWORD }}
          MAIL_FROM: osameli@yandex.ru
          MAIL_TO: nagimo@yandex.ru
        run: |
          python3 <<'PY'
          import mimetypes
          import os
          import smtplib
          from pathlib import Path
          from email.message import EmailMessage

          password = os.environ["SMTP_PASSWORD"]
          if not password:
              print("YANDEX_SMTP_PASSWORD is not configured; skipping email delivery.")
              raise SystemExit(0)

          files = sorted(Path("app/build/outputs/apk/debug").glob("*.apk"))
          if not files:
              raise SystemExit("No debug APK files found to send.")

          message = EmailMessage()
          message["Subject"] = "Pogonya debug APK"
          message["From"] = os.environ["MAIL_FROM"]
          message["To"] = os.environ["MAIL_TO"]
          message.set_content("Debug APK successfully built in GitHub Actions. The APK is attached.")

          for path in files:
              content_type, _ = mimetypes.guess_type(path)
              maintype, subtype = (content_type or "application/octet-stream").split("/", 1)
              message.add_attachment(
                  path.read_bytes(),
                  maintype=maintype,
                  subtype=subtype,
                  filename=path.name,
              )

          with smtplib.SMTP_SSL(os.environ["SMTP_HOST"], int(os.environ["SMTP_PORT"])) as smtp:
              smtp.login(os.environ["SMTP_USER"], password)
              smtp.send_message(message)
          PY
